# EmbedIQ Cloud — OSS infrastructure stack (full).
# Every image is pinned to an exact tag (no `latest`, no bare major) per L-09 / R-9.
# Secrets come from `.env` (generated by ./install.sh); `.env` is optional so the stack
# also boots in CI before install.sh runs. Real deployments run install.sh first.
services:
  mosquitto:
    # mosquitto-go-auth bundles Mosquitto 2.0 + the auth plugin (used by the prod profile to
    # call embediq-api:/internal/auth). Dev loads mosquitto.conf with no plugin → plain anonymous
    # broker, behaviour unchanged. Pinned exact tag + digest (no `latest`, L-09/R-9).
    image: iegomez/mosquitto-go-auth:3.0.0-mosquitto_2.0.18@sha256:138cb22c7846427a158788c5bd90eaaddd4eb5ab58ab571b4369f3b654a286cb
    # The go-auth image defaults its config to /etc/mosquitto/mosquitto.conf; point it at our
    # mounted dev config explicitly (the prod overlay swaps in mosquitto.prod.conf).
    command: mosquitto -c /mosquitto/config/mosquitto.conf
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8883:8883"
    volumes:
      - ./config/mosquitto:/mosquitto/config
      - ./certs:/certs:ro

  influxdb:
    image: influxdb:2.7.12
    restart: unless-stopped
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USER:-embediq}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-changeme-influx-pass}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-embediq}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-telemetry}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-changeme-influx-token}

  loki:
    image: grafana/loki:3.7.2
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./config/loki:/etc/loki
      - loki-data:/loki

  grafana:
    image: grafana/grafana:10.4.19
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASS:-admin}
      INFLUX_TOKEN: ${INFLUX_TOKEN:-changeme-influx-token}
      INFLUX_ORG: ${INFLUX_ORG:-embediq}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-telemetry}
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
      - loki

  hawkbit:
    image: hawkbit/hawkbit-update-server:0.9.0
    restart: unless-stopped
    volumes:
      - hawkbit-data:/artifactrepo

  mediamtx:
    image: bluenviron/mediamtx:1.19.0
    restart: unless-stopped
    ports:
      - "8554:8554"
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
    volumes:
      - ./config/mediamtx/mediamtx.yml:/mediamtx.yml

  embediq-api:
    build: .
    image: embediq-cloud-api:dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - path: .env
        required: false
    depends_on:
      - mosquitto
      - influxdb
      - loki
      - hawkbit
    volumes:
      - ./certs:/certs:ro
      - embediq-db:/data

volumes:
  influxdb-data:
  loki-data:
  hawkbit-data:
  embediq-db:

networks:
  default:
    name: embediq-net
