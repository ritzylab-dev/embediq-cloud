name: release
# Build the container image on a semver tag and push it to GHCR.
#
# NOTE: The public-publish runbook — copy everything EXCEPT `pm/` and `CLAUDE.md`
# to the public `embediq-cloud` repository — lands at the OSS freeze (Phase A4).
# It is a human step and is intentionally not automated here.
on:
  push:
    tags:
      - "v*.*.*"
permissions:
  contents: read
  packages: write
jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
