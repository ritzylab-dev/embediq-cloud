# EmbedIQ Cloud — Mosquitto broker configuration.
# Two listeners: 1883 plain (development) and 8883 TLS/mTLS (production).
persistence true
persistence_location /mosquitto/data/
log_dest stdout

# --- Plain listener (development only) ---
listener 1883

# --- TLS / mTLS listener (production) ---
# Requires certs generated by ./install.sh into ./certs (mounted read-only at /certs).
listener 8883
cafile /certs/ca.crt
certfile /certs/server.crt
keyfile /certs/server.key
require_certificate true

# Development: anonymous is allowed for frictionless local use. Production enforces device auth
# via the mosquitto-go-auth plugin → embediq-api:/internal/auth — see config/mosquitto/mosquitto.prod.conf
# (activated by docker-compose.prod.yml). This dev config loads no plugin.
allow_anonymous true

acl_file /mosquitto/config/aclfile
