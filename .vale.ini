# .vale.ini — prose linting for EmbedIQ docs.
# Lenient at first: the EmbedIQ rules emit warnings, and MinAlertLevel = error
# means warnings do not fail the build yet. The style ratchets over time (D-11)
# by promoting rules to error or lowering MinAlertLevel.
StylesPath = .github/styles
MinAlertLevel = error

[*.md]
BasedOnStyles = EmbedIQ
