# EmbedIQ Cloud — PRODUCTION overlay. Use with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Hardens the broker: TLS-only (no plain 1883) and device auth enforced via the
# mosquitto-go-auth plugin → embediq-api:/internal/auth (+ /internal/acl). Requires:
#   - certs in ./certs (run ./install.sh or scripts/gen-certs.sh first), and
#   - the bridge credential in .env: INTERNAL_BRIDGE_USER / INTERNAL_BRIDGE_PASS (so the api
#     accepts the bridge) and matching MQTT_USERNAME / MQTT_PASSWORD (so the bridge authenticates).
# API TLS: terminate TLS for embediq-api at a reverse proxy (e.g. Caddy/nginx/Traefik) in front
# of :8080 — the app speaks plain HTTP behind the proxy; do not expose :8080 publicly in prod.
services:
  mosquitto:
    # Pass the shared secret to the broker container so it can be rendered into the config.
    environment:
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
    # Render ${INTERNAL_API_KEY} into the prod config (go-auth carries it in User-Agent — see
    # mosquitto.prod.conf), then run the TLS-only broker. The literal `$` reaches the container
    # shell as `$$` (Compose unescapes it); the key is hex so it is sed-replacement-safe.
    command: ["sh", "-c", "sed \"s|[$$]{INTERNAL_API_KEY}|$$INTERNAL_API_KEY|\" /mosquitto/config/mosquitto.prod.conf > /tmp/mosquitto.prod.conf && exec mosquitto -c /tmp/mosquitto.prod.conf"]
    # Replace the published ports entirely so the plaintext 1883 listener is NOT exposed.
    ports: !override
      - "8883:8883"

  embediq-api:
    # Production profile: enforce fail-closed startup (INTERNAL_API_KEY required) and surface the
    # broker/bridge credentials. These come from .env (generated by install.sh); listed here so the
    # prod wiring is self-documenting.
    environment:
      EMBEDIQ_PROFILE: prod
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
      INTERNAL_BRIDGE_USER: ${INTERNAL_BRIDGE_USER:-}
      INTERNAL_BRIDGE_PASS: ${INTERNAL_BRIDGE_PASS:-}
      MQTT_USERNAME: ${INTERNAL_BRIDGE_USER:-}
      MQTT_PASSWORD: ${INTERNAL_BRIDGE_PASS:-}
