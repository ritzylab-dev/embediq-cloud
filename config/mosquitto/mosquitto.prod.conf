# EmbedIQ Cloud — Mosquitto PRODUCTION configuration (TLS-only + device auth).
# Activated by docker-compose.prod.yml. Differs from the dev config: no plain 1883 listener,
# anonymous OFF, and the mosquitto-go-auth plugin authenticates/authorizes every client against
# embediq-api. Requires certs in ./certs (./install.sh / scripts/gen-certs.sh) and the bridge
# credential env (INTERNAL_BRIDGE_USER/PASS on embediq-api, MQTT_USERNAME/PASSWORD on the bridge).
persistence true
persistence_location /mosquitto/data/
log_dest stdout

# --- TLS / mTLS listener only (no plain 1883 in production) ---
listener 8883
cafile /certs/ca.crt
certfile /certs/server.crt
keyfile /certs/server.key
require_certificate true
# Use the client-certificate CN as the username so cert_cn validation flows to /internal/auth.
use_identity_as_username true

# --- device auth via mosquitto-go-auth → embediq-api /internal/auth (+ /internal/acl) ---
allow_anonymous false
auth_plugin /mosquitto/go-auth.so
auth_opt_backends http
auth_opt_http_method POST
auth_opt_http_host embediq-api
auth_opt_http_port 8080
auth_opt_http_getuser_uri /internal/auth
auth_opt_http_aclcheck_uri /internal/acl
# Allow/deny is taken from the HTTP status (2xx = allow), matching the endpoints' 200/403.
auth_opt_http_response_mode status
# Shared-secret for the /internal endpoints (PR-SEC2). go-auth v3.0.0's http backend has NO
# custom-header or custom-param facility (only username/password/clientid + a settable User-Agent),
# so we carry the secret in User-Agent; the endpoint accepts it from User-Agent or X-Internal-Key.
# The ${INTERNAL_API_KEY} placeholder is substituted from the environment at container start
# (docker-compose.prod.yml) — never commit the literal secret.
auth_opt_http_user_agent ${INTERNAL_API_KEY}
