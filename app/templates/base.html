<!doctype html>
<!--
  EmbedIQ Cloud admin UI — app shell (left sidebar + topbar).
  @company embediq.com | ritzylab.com · SPDX-License-Identifier: Apache-2.0
  Server-rendered Jinja2 + hand-authored design system (design-system.css) + vanilla ES.
  Framework-free, no build step. Themed by data-theme on <html>. Spec: pm/knowledge/UI_DESIGN_SPEC.md.
-->
<html lang="en" data-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}EmbedIQ Cloud{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link href="/static/design-system.css" rel="stylesheet" />
    <!-- set the theme before paint to avoid a flash; honours saved choice then OS preference -->
    <script>
      (function () {
        var saved = localStorage.getItem("embediq-theme");
        var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", saved || (prefersDark ? "dark" : "light"));
      })();
    </script>
    <!-- charting: Chart.js pinned to an exact version via jsDelivr with SRI (no floating tag) -->
    <script
      src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"
      integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ"
      crossorigin="anonymous"
      defer
    ></script>
    <script src="/static/app.js" defer></script>
    {% block head_scripts %}{% endblock %}
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" id="sidebar">
        <a class="sidebar-brand" href="/ui/overview">Embed<span class="brand-accent">IQ</span> Cloud</a>
        <nav class="nav" aria-label="Primary">
          <a class="nav-item {{ 'active' if active == 'overview' else '' }}" href="/ui/overview">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="3" y="3" width="7" height="9" rx="1.5" /><rect x="14" y="3" width="7" height="5" rx="1.5" />
              <rect x="14" y="12" width="7" height="9" rx="1.5" /><rect x="3" y="16" width="7" height="5" rx="1.5" />
            </svg>
            <span>Overview</span>
          </a>
          <a class="nav-item {{ 'active' if active == 'fleet' else '' }}" href="/ui/fleet">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="4" y="4" width="16" height="16" rx="2" /><rect x="9" y="9" width="6" height="6" />
              <path d="M9 2v2M15 2v2M9 20v2M15 20v2M2 9h2M2 15h2M20 9h2M20 15h2" />
            </svg>
            <span>Fleet</span>
          </a>
          <a class="nav-item {{ 'active' if active == 'ota' else '' }}" href="/ui/ota">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M12 3v12M8 11l4 4 4-4" /><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" />
            </svg>
            <span>OTA</span>
          </a>
          <a class="nav-item {{ 'active' if active == 'settings' else '' }}" href="/ui/settings">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-2.82 1.17V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 7.5 19.4l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 9H4.5a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 6.27 4.6l-.06-.06A2 2 0 1 1 9.04 1.7l.06.06A1.65 1.65 0 0 0 11 2.6V2.5a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 2.82 1.17l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 21.4 9h.1a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.17 2z" />
            </svg>
            <span>Settings</span>
          </a>
        </nav>
        <div class="sidebar-foot">
          <button id="theme-toggle" class="icon-btn" type="button" title="Toggle dark / light" aria-label="Toggle dark / light">
            <span class="theme-icon" aria-hidden="true">◐</span>
          </button>
          <button id="logout-btn" class="btn btn-ghost btn-sm push" type="button">Sign out</button>
        </div>
      </aside>
      <div class="scrim" id="drawer-scrim"></div>

      <div class="main">
        <header class="topbar">
          <button class="icon-btn drawer-toggle" id="drawer-toggle" type="button" aria-label="Open menu">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M3 6h18M3 12h18M3 18h18" />
            </svg>
          </button>
          <h1 class="topbar-title">{% block page_title %}{% endblock %}</h1>
          <div class="topbar-actions">{% block actions %}{% endblock %}</div>
        </header>
        <main class="content">{% block content %}{% endblock %}</main>
      </div>
    </div>

    <div id="toast-tray" class="toast-tray" aria-live="polite" aria-atomic="true"></div>
    {% block scripts %}{% endblock %}
  </body>
</html>
